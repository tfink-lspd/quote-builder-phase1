version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: quote-builder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quote_builder
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quote_builder_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quote_builder"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
